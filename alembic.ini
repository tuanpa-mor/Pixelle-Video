# Pixelle-Video Auth Schema Migrations
# Managed by Alembic. Target: api.auth.models.Base

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Path to the target metadata on the import path
prepend_sys_path = .

# Logging config
file_template = %%(rev)s_%%(slug)s

# Disable branching by default
branch_labels_literal = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
